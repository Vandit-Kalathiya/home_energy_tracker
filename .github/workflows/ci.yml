name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest
    env:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: 127.0.0.1:9094
      SPRING_KAFKA_LISTENER_AUTO_STARTUP: 'false'
      LOGGING_LEVEL_ROOT: WARN
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: WARN

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Start Infrastructure (Docker Compose)
        run: |
          docker compose up -d --wait
          echo "Infrastructure is fully healthy and ready!"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build, Test, and Push Service Images
        run: |
          set -e
          for service in user-service device-service ingestion-service usage-service alert-service insight-service api-gateway; do
            echo "========================================="
            echo "Building, testing, and pushing $service"
            echo "========================================="
            cd $service
            mvn -B -ntp clean package
            
            IMAGE_NAME="${{ secrets.DOCKER_USERNAME }}/home-energy-tracker-$service"
            docker build -t $IMAGE_NAME:latest -t $IMAGE_NAME:${{ github.sha }} .
            docker push $IMAGE_NAME:latest
            docker push $IMAGE_NAME:${{ github.sha }}
            cd ..
          done

      - name: Tear Down Infrastructure
        if: always()
        run: |
          docker compose down
          sudo rm -rf influxdb_data volume-data docker/kafka_data
