name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4

      - name: Start Infrastructure (Docker Compose)
        run: |
          docker compose up -d
          echo "Waiting for services to spin up..."
          sleep 15

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Validate Codebase (Run Tests)
        run: |
          set -e
          for service in user-service device-service ingestion-service usage-service alert-service insight-service api-gateway; do
            echo "========================================="
            echo "Building and validating $service"
            echo "========================================="
            cd $service
            mvn clean package
            cd ..
          done

      - name: Build Docker Images
        run: |
          set -e
          for service in user-service device-service ingestion-service usage-service alert-service insight-service api-gateway; do
            echo "========================================="
            echo "Building Docker image for $service"
            echo "========================================="
            docker build -t home-energy-tracker/$service:latest ./$service
          done

      - name: Tear Down Infrastructure
        if: always()
        run: docker compose down
